      - name: Build
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anotai-print-win
          path: |
            dist/*.exe
            dist/*.zip
            dist/latest.yml
          if-no-files-found: warn

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: anotai-print-win
          path: dist

      - name: List files
        run: ls -la dist/

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Anotaí Print ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          files: dist/*
          body: |
            ## Anotai Print ${{ steps.version.outputs.version }}

            ### Download

            | Plataforma | Arquivo | Tipo |
            |-----------|---------|------|
            | Windows | `.exe` | Instalador (recomendado) |
            | Windows | `.zip` | Portatil (sem instalacao) |
            | Linux | `.AppImage` | Execute direto |
            | Linux | `.deb` | Pacote Debian/Ubuntu |

            ### O que faz
            - Impressao 100% silenciosa - sem dialogo do navegador
            - Impressoras termicas 58mm e 80mm
            - ESC/POS direto via USB e rede TCP
            - Notificacoes nativas do sistema
            - Minimiza para a bandeja do sistema
            - Inicia junto com o Windows
            - Auto-atualizacao automatica
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
